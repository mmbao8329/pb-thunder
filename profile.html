<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Của Tôi - P&B Thunder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .info-group { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .info-label { color: #aaaaaa; font-size: 14px; margin-bottom: 5px; }
        .info-value { color: #ffffff; font-size: 16px; font-weight: bold; word-break: break-all;}
        .edit-btn { background: rgba(255,204,0,0.1); color: #ffcc00; border: 1px solid #ffcc00; padding: 5px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 13px;}
        .edit-btn:hover { background: #ffcc00; color: black; }
        .wallet-box { background: linear-gradient(135deg, #2a2a2a, #111); border: 1px solid #00ffcc; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); margin-top: 20px;}
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            <span class="icon">⚡</span> P&B Thunder
        </div>
        <button class="mobile-toggle" onclick="document.getElementById('headerRight').classList.toggle('show')">☰</button>
        <div class="header-right" id="headerRight">
            <nav>
                <a href="index.html">Trang chủ</a>
                <a href="about.html">Giới thiệu</a>
                <a href="dichvu.html">Dịch vụ</a>
                <a href="contact.html">Liên hệ</a>
            </nav>
            <div class="auth-buttons">
                <button id="loginBtnTrigger" class="login-btn glow-btn" onclick="document.getElementById('authModal').style.display='flex'">Đăng nhập</button>
                <div id="userProfile" style="display: none; align-items: center; gap: 15px;">
                    <span id="userGreeting" class="user-greeting"></span>
                    <button id="logoutBtn" class="login-btn outline-btn">Đăng xuất</button>
                </div>
            </div>
        </div>
    </header>

    <main style="padding: 40px 20px; flex-direction: column; width: 100%; align-items: center; display: flex;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 class="gradient-text" style="font-size: 38px;">Quản Lý Tài Khoản</h1>
        </div>

        <div class="contact-card glass-panel" style="max-width: 600px; width: 100%; text-align: left; padding: 30px;">
            
            <div style="display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 10px;">
                <div class="avatar-box" id="avatarDisplay" style="margin: 0 auto 15px auto; width: 100px; height: 100px; border-color: #ffcc00; color: #ffcc00; overflow: hidden;">
                    <svg width="50" height="50" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                </div>
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
                <button class="edit-btn" onclick="document.getElementById('avatarUpload').click()">📸 Tải Ảnh Lên</button>
            </div>

            <div class="profile-container">
                <div class="info-group">
                    <div><div class="info-label">Tên hiển thị</div><div class="info-value" id="profileName">Đang tải...</div></div>
                    <button class="edit-btn" onclick="updateUserName()">✏️ Đổi tên</button>
                </div>
                <div class="info-group">
                    <div><div class="info-label">Email đăng nhập</div><div class="info-value" id="profileEmail">Đang tải...</div></div>
                    <button class="edit-btn" onclick="showPbAlert('⚠️ Hệ thống', 'Vui lòng liên hệ Admin để thay đổi Email (Yêu cầu xác thực bảo mật).')">✏️ Cập nhật</button>
                </div>
                <div class="info-group">
                    <div><div class="info-label">Số điện thoại</div><div class="info-value" id="profilePhone">Chưa liên kết</div></div>
                    <button class="edit-btn" onclick="showPbAlert('⚠️ Đang bảo trì', 'Tính năng xác thực OTP Số điện thoại đang được nâng cấp. Vui lòng quay lại sau!')">🔗 Liên kết</button>
                </div>
                <div class="info-group">
                    <div><div class="info-label">Mã tài khoản (UID)</div><div class="info-value" id="profileUid" style="font-family: monospace; color: #ffcc00; font-size: 14px;">...</div></div>
                    <button class="edit-btn" onclick="copyUid()">📋 Copy</button>
                </div>
            </div>

            <div class="wallet-box">
                <p style="color: #00ffcc; font-size: 16px; margin-bottom: 10px; font-weight: bold;">⚡ VÍ P&B THUNDER</p>
                <h2 style="font-size: 36px; color: white; margin-bottom: 20px;">0 <span style="font-size: 20px; color: #aaa;">VNĐ</span></h2>
                <button class="cta-btn glow-btn" onclick="showPbAlert('💰 Nạp Tiền Vào Ví', 'Để nạp tiền vào tài khoản, vui lòng chuyển khoản Momo/Mbbank kèm nội dung: <br><br><b>NAP [Mã UID của bạn]</b><br><br>Sau đó liên hệ Admin qua Zalo để được cộng tiền ngay lập tức!')">Thêm Số Dư</button>
            </div>
        </div>
    </main>

    <div id="authModal" class="modal"><div class="modal-content glass-panel"><span class="close" onclick="document.getElementById('authModal').style.display='none'">&times;</span><h2 id="modalTitle" style="margin-bottom: 20px; color: #ffcc00;">Đăng nhập</h2><form id="authForm"><div id="displayNameContainer" style="display: none;"><input type="text" id="displayName" placeholder="Tên hiển thị (VD: Lôi Thần)"></div><input type="email" id="email" placeholder="Email của bạn" required><input type="password" id="password" placeholder="Mật khẩu (từ 6 ký tự)" required><button type="submit" class="cta-btn glow-btn" style="width: 100%; margin-top: 20px;">Xác nhận</button></form><p style="margin-top: 20px; text-align: center;"><a href="#" onclick="toggleAuthMode()" id="toggleAuthText" style="color: #aaaaaa; text-decoration: none; font-size: 14px; transition: 0.3s;">Chưa có tài khoản? <b>Đăng ký ngay</b></a></p></div></div>
    
    <div id="pbAlertModal" class="modal" style="z-index: 99999;"><div class="modal-content glass-panel" style="max-width: 320px; text-align: center; padding: 30px; border-color: #ffcc00; box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);"><h2 id="pbAlertTitle" style="color: #ffcc00; margin-bottom: 15px; font-size: 22px;">⚡ P&B Thunder</h2><p id="pbAlertMessage" style="color: #dddddd; margin-bottom: 25px; line-height: 1.6; font-size: 15.5px;"></p><button id="pbAlertBtn" class="cta-btn glow-btn" onclick="closePbAlert()" style="width: 100%;">Đã Hiểu</button></div></div>

    <div id="pbPromptModal" class="modal" style="z-index: 99999;">
        <div class="modal-content glass-panel" style="max-width: 320px; text-align: center; padding: 30px; border-color: #ffcc00; box-shadow: 0 0 30px rgba(255, 204, 0, 0.2);">
            <h2 id="pbPromptTitle" style="color: #ffcc00; margin-bottom: 15px; font-size: 22px;">Nhập thông tin</h2>
            <p id="pbPromptMessage" style="color: #dddddd; margin-bottom: 15px; font-size: 15px;"></p>
            <input type="text" id="pbPromptInput" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #555; background: rgba(0,0,0,0.5); color: white; outline: none; font-size: 16px;" autocomplete="off">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="cta-btn outline-btn" onclick="closePbPrompt()" style="flex: 1; padding: 10px; font-size: 14px;">Hủy</button>
                <button id="pbPromptConfirmBtn" class="cta-btn glow-btn" style="flex: 1; padding: 10px; font-size: 14px;">Xác nhận</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function closePbAlert() { document.getElementById("pbAlertModal").style.display = "none"; }
        function closePbPrompt() { document.getElementById("pbPromptModal").style.display = "none"; }
    </script>
</body>
</html>
